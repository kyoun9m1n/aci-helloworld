name: Trigger auto deployment for my-app

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/my-app-AutoDeployTrigger-c31eaa0a-ab26-4c28-b055-48df2520bcb0.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.MYAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.MYAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.MYAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: kmtest01.azurecr.io
          registryUsername: ${{ secrets.MYAPP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.MYAPP_REGISTRY_PASSWORD }}
          containerAppName: my-app
          resourceGroup: kmtest
          imageToBuild: kmtest01.azurecr.io/my-app:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


